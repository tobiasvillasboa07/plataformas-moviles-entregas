<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página con Componentes</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">sitio web</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuSuperior">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-end" id="menuSuperior">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#">enlace 1</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">enlace 2</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">enlace 3</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="carruselHeader" class="carousel slide mb-4" style="background-color: #7852c9; height: 100px;">
        <div class="carousel-inner h-100">
            <div class="carousel-item active h-100 d-flex flex-column align-items-center justify-content-center text-white">
                <h5 class="mb-2">rompiste corazón</h5>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carruselHeader" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carruselHeader" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="container bg-white border rounded p-4 mb-5">
        
        <div class="text-center mb-4">
            <h3>Artículo</h3>
            <p class="text-muted">Subartículo</p>
        </div>

        <div class="row mb-5">
            <div class="col-12 col-md-3 mb-3">
                <div class="card">
                    <img src="https://via.placeholder.com/300x200?text=300+x+200" class="card-img-top" alt="Gris">
                    <div class="card-body">
                        <h6 class="card-title">Carta 1</h6>
                        <p class="card-text" style="font-size: 14px;">Texto de ejemplo para la carta 1.</p>
                    </div>
                </div>
            </div>
            
            <div class="col-12 col-md-3 mb-3">
                <div class="card">
                    <img src="https://via.placeholder.com/300x200?text=300+x+200" class="card-img-top" alt="Gris">
                    <div class="card-body">
                        <h6 class="card-title">Carta 2</h6>
                        <p class="card-text" style="font-size: 14px;">Texto de ejemplo para la carta 2.</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-3 mb-3">
                <div class="card">
                    <img src="https://via.placeholder.com/300x200?text=300+x+200" class="card-img-top" alt="Gris">
                    <div class="card-body">
                        <h6 class="card-title">Carta 3</h6>
                        <p class="card-text" style="font-size: 14px;">Texto de ejemplo para la carta 3.</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-3 mb-3">
                <div class="card">
                    <img src="https://via.placeholder.com/300x200?text=300+x+200" class="card-img-top" alt="Gris">
                    <div class="card-body">
                        <h6 class="card-title">Carta 4</h6>
                        <p class="card-text" style="font-size: 14px;">Texto de ejemplo para la carta 4.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="accordion mb-5" id="miAcordeon">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button bg-primary text-white bg-opacity-25" type="button" data-bs-toggle="collapse" data-bs-target="#abrirItem1">
                        Artículo n.º 1
                    </button>
                </h2>
                <div id="abrirItem1" class="accordion-collapse collapse show" data-bs-parent="#miAcordeon">
                    <div class="accordion-body">
                        <strong>a</strong>
                    </div>
                </div>
            </div>
            
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#abrirItem2">
                        Artículo n.º 2
                    </button>
                </h2>
                <div id="abrirItem2" class="accordion-collapse collapse" data-bs-parent="#miAcordeon">
                    <div class="accordion-body">Contenido 2...</div>
                </div>
            </div>

            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#abrirItem3">
                        Artículo n.º 3
                    </button>
                </h2>
                <div id="abrirItem3" class="accordion-collapse collapse" data-bs-parent="#miAcordeon">
                    <div class="accordion-body">Contenido 3...</div>
                </div>
            </div>
        </div>

        <div class="border p-4 rounded mb-3">
            <div class="row mb-3 align-items-center">
                <label class="col-sm-2 col-form-label">Nombre</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" placeholder="Ingrese su nombre">
                </div>
            </div>
            
            <div class="row mb-3 align-items-center">
                <label class="col-sm-2 col-form-label">Gmail</label>
                <div class="col-sm-10">
                    <input type="email" class="form-control" placeholder="Ingrese su gmail">
                </div>
            </div>
            
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">Comentario</label>
                <div class="col-sm-10">
                    <textarea class="form-control" rows="4" placeholder="Escriba un comentario"></textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-primary">Enviar</button>
                <button type="button" class="btn btn-secondary">Limpiar</button>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
